name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Scaffold missing Android platform files
        run: flutter create . --platforms=android --org com.yiwa.reminder --project-name reminder_app

      - name: Remove conflicting default widget test
        run: rm -f test/widget_test.dart

      - name: Patch Android Gradle config (desugaring + compileSdk/targetSdk)
        run: |
          set -e
          if [ -f android/app/build.gradle.kts ]; then
            echo "Appending config to build.gradle.kts"
            cat >> android/app/build.gradle.kts << 'EOF'

android {
    compileSdk = 35
    defaultConfig {
        targetSdk = 34
    }
    compileOptions {
        isCoreLibraryDesugaringEnabled = true
    }
}

dependencies {
    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.0.4")
}
EOF
            cat android/app/build.gradle.kts
          elif [ -f android/app/build.gradle ]; then
            echo "Appending config to build.gradle"
            cat >> android/app/build.gradle << 'EOF'

android {
    compileSdkVersion 35
    defaultConfig {
        targetSdkVersion 34
    }
    compileOptions {
        coreLibraryDesugaringEnabled true
    }
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.0.4'
}
EOF
            cat android/app/build.gradle
          else
            echo "No app-level Gradle file found, skipping patch"
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Drift code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze
        continue-on-error: true

      - name: Build APK (release)
        run: flutter build apk --release --verbose 2>&1 | tee gradle_build.log

      - name: Upload build log (always, for diagnosis)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: gradle_build.log

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: reminder-app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
